<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Amboseli Trees</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="topbar">
    <div class="container">
      <div class="brand"><img id="siteLogo" src="/logo.svg" alt="logo" width="34" height="34"><span class="brand-text">Amboseli Green Ambassadors</span></div>
      <nav class="nav">
        <a href="/">Map</a>
        <a href="/dashboard.html">Dashboard</a>
        <a href="/admin-login.html">Admin</a>
        <button id="compactToggle" class="secondary">☰</button>
        <button id="themeToggle" class="secondary">🌙</button>
      </nav>
    </div>
  </div>
  <div id="map" style="right:400px"></div>
  <div id="panel">
    <div id="summary">
      <p><strong>Total trees:</strong> <span id="total">—</span></p>
    </div>
    <canvas id="speciesChart" width="350" height="200"></canvas>
    <hr>
    <p><a href="/admin.html">Go to Admin</a></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="dashboard.js"></script>
  <script src="ui.js"></script>
</body>
</html>
