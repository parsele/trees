<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Amboseli Trees</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#10b981">
  <style>body{background:var(--bg)}.login-card{max-width:420px;margin:120px auto;padding:20px;border:1px solid #e6e9ef;background:var(--card);border-radius:10px}</style>
</head>
<body>
  <div id="topbar">
    <div class="container">
      <div class="brand"><img id="siteLogo" src="/logo.svg" width="34" height="34"><span class="brand-text">Amboseli Green Ambassadors</span></div>
      <nav class="nav">
        <a href="/">Map</a>
        <a href="/admin-login.html">Admin</a>
        <button id="compactToggle" class="secondary">☰</button>
        <button id="themeToggle" class="secondary">🌙</button>
      </nav>
    </div>
  </div>

  <div class="login-card">
    <h2>Admin Login</h2>
    <form id="loginForm">
      <label>Password: <input name="password" type="password" required></label>
      <div style="margin-top:12px">
        <button type="submit">Sign in</button>
        <span id="msg" style="color:#e11d48;margin-left:12px"></span>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const pw = e.target.password.value;
      const res = await fetch('/api/admin/login', {method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
      if(res.ok){ window.location='/admin.html'; }
      else { const j=await res.json(); document.getElementById('msg').textContent = j.error || 'Login failed'; }
    });
  </script>
  <script src="ui.js"></script>
</body>
</html>
